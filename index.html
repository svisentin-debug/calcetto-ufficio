<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcetto Balilla — Websonica × Google</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFF032;
    --bg: #0d0d0d;
    --card: #151515;
    --card2: #1a1a1a;
    --border: #2a2a2a;
    --text: #ffffff;
    --muted: #666;
    --red: #ff4444;
    --green: #44ff88;
    --blue: #4488ff;
    --purple: #aa44ff;
    --orange: #ff8844;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    background-image:
      linear-gradient(rgba(255,240,50,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,240,50,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,13,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-logos {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--yellow);
  }
  .logo-sep { color: var(--muted); font-size: 18px; }
  .header-ball {
    font-size: 28px;
    animation: floatBall 3s ease-in-out infinite;
    filter: drop-shadow(0 0 8px var(--yellow));
  }
  @keyframes floatBall {
    0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 8px var(--yellow)); }
    50% { transform: translateY(-6px); filter: drop-shadow(0 0 16px var(--yellow)); }
  }
  .header-title {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--yellow);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .status-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    align-items: center;
  }

  /* NAV */
  nav {
    display: flex;
    gap: 4px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  .nav-btn.active {
    background: var(--yellow);
    color: var(--bg);
    border-color: var(--yellow);
  }

  /* MONTHS */
  .months-bar {
    display: flex;
    gap: 4px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: rgba(255,240,50,0.02);
  }
  .months-bar::-webkit-scrollbar { display: none; }
  .month-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .month-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  .month-btn.active { background: rgba(255,240,50,0.15); color: var(--yellow); border-color: var(--yellow); }

  /* MAIN */
  main { padding: 24px; max-width: 800px; margin: 0 auto; }

  /* SECTION TABS */
  .section-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--card);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .section-tab {
    flex: 1;
    padding: 8px 12px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-align: center;
  }
  .section-tab.active { background: var(--yellow); color: var(--bg); }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* LEADERBOARD */
  .rank-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num {
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank-num.gold { color: #FFD700; }
  .rank-num.silver { color: #C0C0C0; }
  .rank-num.bronze { color: #CD7F32; }
  .rank-name { flex: 1; font-size: 14px; font-weight: 700; }
  .rank-stats { display: flex; gap: 16px; align-items: center; }
  .stat-chip {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .stat-chip.wins { background: rgba(68,255,136,0.15); color: var(--green); }
  .stat-chip.losses { background: rgba(255,68,68,0.15); color: var(--red); }
  .stat-chip.rate { background: rgba(255,240,50,0.15); color: var(--yellow); }
  .stat-chip.pts { background: rgba(255,240,50,0.2); color: var(--yellow); border: 1px solid rgba(255,240,50,0.3); }
  .stat-chip.pred { background: rgba(170,68,255,0.15); color: var(--purple); }
  .stat-chip.pred-pos { background: rgba(68,255,136,0.15); color: var(--green); }
  .stat-chip.pred-neg { background: rgba(255,68,68,0.15); color: var(--red); }

  /* MATCHES */
  .match-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .match-row:last-child { border-bottom: none; }
  .match-type-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 5px;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .badge-1v1 { background: rgba(68,136,255,0.2); color: var(--blue); }
  .badge-2v2 { background: rgba(255,136,68,0.2); color: var(--orange); }
  .match-info { flex: 1; }
  .match-teams { font-size: 13px; font-weight: 700; }
  .match-teams .winner { color: var(--yellow); }
  .match-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .del-btn {
    background: none;
    border: 1px solid rgba(255,68,68,0.3);
    color: rgba(255,68,68,0.6);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 600;
  }
  .del-btn:hover { background: rgba(255,68,68,0.1); color: var(--red); border-color: var(--red); }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
  .type-row { display: flex; gap: 8px; }
  .type-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .type-btn.active { background: rgba(255,240,50,0.1); color: var(--yellow); border-color: var(--yellow); }
  .date-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card2);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 13px;
    font-weight: 600;
  }
  .date-input:focus { outline: none; border-color: var(--yellow); }
  .chips-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--yellow); color: var(--yellow); }
  .chip.selected-win { background: rgba(68,255,136,0.15); color: var(--green); border-color: var(--green); }
  .chip.selected-lose { background: rgba(255,68,68,0.15); color: var(--red); border-color: var(--red); }
  .chip.selected-pred { background: rgba(170,68,255,0.15); color: var(--purple); border-color: var(--purple); }
  .chip.disabled { opacity: 0.3; pointer-events: none; }
  .preview-box {
    background: rgba(255,240,50,0.05);
    border: 1px solid rgba(255,240,50,0.2);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--yellow);
  }
  .submit-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--yellow);
    color: var(--bg);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,240,50,0.3); }
  .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
  .submit-btn.danger { background: var(--red); color: white; }

  /* PREDICTIONS */
  .announced-match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .announced-match-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--purple), var(--yellow));
  }
  .announced-match-card.resolved::before {
    background: linear-gradient(90deg, var(--green), var(--yellow));
  }
  .announced-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .announced-teams { font-size: 15px; font-weight: 800; }
  .announced-vs { color: var(--muted); margin: 0 8px; }
  .announced-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 0.05em;
  }
  .badge-open { background: rgba(170,68,255,0.2); color: var(--purple); }
  .badge-resolved { background: rgba(68,255,136,0.2); color: var(--green); }
  .pred-votes {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .pred-vote-btn {
    flex: 1;
    min-width: 120px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .pred-vote-btn:hover { border-color: var(--purple); color: var(--purple); }
  .pred-vote-btn.voted { background: rgba(170,68,255,0.15); color: var(--purple); border-color: var(--purple); }
  .pred-vote-btn.voted-correct { background: rgba(68,255,136,0.15); color: var(--green); border-color: var(--green); }
  .pred-vote-btn.voted-wrong { background: rgba(255,68,68,0.15); color: var(--red); border-color: var(--red); }
  .pred-bar {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .pred-bar-fill { height: 100%; background: var(--purple); border-radius: 2px; transition: width 0.5s; }
  .pred-count { font-size: 10px; color: var(--muted); margin-top: 6px; }
  .predictor-select-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 10px 12px;
    background: var(--card2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .predictor-label { font-size: 11px; color: var(--muted); font-weight: 700; white-space: nowrap; }
  .predictor-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .pred-result-info {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .resolve-section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .resolve-label { font-size: 11px; color: var(--muted); font-weight: 700; }
  .resolve-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .resolve-btn:hover { border-color: var(--green); color: var(--green); }
  .resolve-btn.active-resolve { background: rgba(68,255,136,0.15); color: var(--green); border-color: var(--green); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; display: block; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--yellow);
    color: var(--bg);
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 13px;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: white; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 460px;
  }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-h { font-size: 16px; font-weight: 800; }

  /* PREDICTION SCORE BADGE */
  .pred-score {
    font-size: 13px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .pred-score.positive { background: rgba(68,255,136,0.15); color: var(--green); }
  .pred-score.negative { background: rgba(255,68,68,0.15); color: var(--red); }
  .pred-score.zero { background: rgba(255,255,255,0.05); color: var(--muted); }

  @media (max-width: 600px) {
    main { padding: 16px; }
    .rank-stats { gap: 8px; }
    .stat-chip { font-size: 10px; padding: 2px 6px; }
  }
</style>
</head>

function getMonths() {
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m = d.toISOString().slice(0,7);
    months.push(m);
  }
  if (!months.includes(now.toISOString().slice(0,7))) months.push(now.toISOString().slice(0,7));
  return [...new Set(months)];
}

function formatMonth(m) {
  const [y, mo] = m.split('-');
  const names = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  return names[parseInt(mo)-1] + ' ' + y;
}

function renderMonths() {
  const bar = document.getElementById('monthsBar');
  const months = getMonths();
  bar.innerHTML = months.map(m =>
    `<button class="month-btn ${m===currentMonth?'active':''}" data-month="${m}">${formatMonth(m)}</button>`
  ).join('');
  bar.querySelectorAll('.month-btn').forEach(b => {
    b.addEventListener('click', () => {
      currentMonth = b.dataset.month;
      renderMonths();
      renderAll();
    });
  });
}

// ---- RANKINGS ----

function getMatchesForMonth(m) {
  return matches.filter(x => x.month === m);
}

function renderSingolo() {
  const ms = getMatchesForMonth(currentMonth).filter(x=>x.type==='singolo');
  const stats = {};
  for (const p of players) stats[p.name] = { wins:0, losses:0 };
  for (const m of ms) {
    if (!stats[m.winner]) stats[m.winner] = { wins:0, losses:0 };
    if (!stats[m.loser]) stats[m.loser] = { wins:0, losses:0 };
    stats[m.winner].wins++;
    stats[m.loser].losses++;
  }
  const rows = Object.entries(stats)
    .filter(([,v])=>v.wins+v.losses>0)
    .sort((a,b)=>b[1].wins-a[1].wins||(b[1].wins/(b[1].wins+b[1].losses||1))-(a[1].wins/(a[1].wins+a[1].losses||1)));
  const el = document.getElementById('tab-singolo');
  if (!rows.length) { el.innerHTML = emptyState('Nessuna partita singolo questo mese'); return; }
  el.innerHTML = `<div class="card">${rows.map(([name,v],i)=>{
    const wr = v.wins+v.losses ? Math.round(v.wins/(v.wins+v.losses)*100) : 0;
    const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    return `<div class="rank-row">
      <span class="rank-num ${cls}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
      <span class="rank-name">${name}</span>
      <div class="rank-stats">
        <span class="stat-chip wins">✓ ${v.wins}</span>
        <span class="stat-chip losses">✗ ${v.losses}</span>
        <span class="stat-chip rate">${wr}%</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderCoppie() {
  const ms = getMatchesForMonth(currentMonth).filter(x=>x.type==='coppia');
  const stats = {};
  for (const m of ms) {
    const wKey = [m.winner, m.winner2].filter(Boolean).sort().join(' & ');
    const lKey = [m.loser, m.loser2].filter(Boolean).sort().join(' & ');
    if (!stats[wKey]) stats[wKey] = { wins:0, losses:0 };
    if (!stats[lKey]) stats[lKey] = { wins:0, losses:0 };
    stats[wKey].wins++;
    stats[lKey].losses++;
  }
  const rows = Object.entries(stats).sort((a,b)=>b[1].wins-a[1].wins);
  const el = document.getElementById('tab-coppie');
  if (!rows.length) { el.innerHTML = emptyState('Nessuna partita coppia questo mese'); return; }

    const wr = v.wins+v.losses ? Math.round(v.wins/(v.wins+v.losses)*100) : 0;

        <span class="stat-chip rate">${wr}%</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderPerfCoppia() {
  const ms = getMatchesForMonth(currentMonth).filter(x=>x.type==='coppia');
  const stats = {};
  for (const p of players) stats[p.name] = { wins:0, losses:0 };
  for (const m of ms) {
    [m.winner, m.winner2].filter(Boolean).forEach(p => {
      if (!stats[p]) stats[p] = { wins:0, losses:0 };
      stats[p].wins++;

    [m.loser, m.loser2].filter(Boolean).forEach(p => {
      if (!stats[p]) stats[p] = { wins:0, losses:0 };
      stats[p].losses++;
    });
  }
  const rows = Object.entries(stats).filter(([,v])=>v.wins+v.losses>0).sort((a,b)=>b[1].wins-a[1].wins);
  const el = document.getElementById('tab-perf-coppia');

  el.innerHTML = `<div class="card">${rows.map(([name,v],i)=>{
    const wr = v.wins+v.losses ? Math.round(v.wins/(v.wins+v.losses)*100) : 0;
    const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';

function getPredictionStats() {
  // Returns per-player: correct, wrong, total (all months or just current? all time for predictions tab, but filterable)
  const stats = {};
  for (const p of players) stats[p.name] = { correct:0, wrong:0 };
  for (const pred of predictions) {
    if (pred.is_correct === null || pred.is_correct === undefined) continue;
    if (!stats[pred.predictor]) stats[pred.predictor] = { correct:0, wrong:0 };
    if (pred.is_correct) stats[pred.predictor].correct++;
    else stats[pred.predictor].wrong++;
  }
  return stats;
}

function renderPrevisioni() {
  const stats = getPredictionStats();
  const rows = Object.entries(stats)
    .filter(([,v])=>v.correct+v.wrong>0)
    .sort((a,b) => (b[1].correct-b[1].wrong) - (a[1].correct-a[1].wrong));
  const el = document.getElementById('tab-previsioni');
  if (!rows.length) { el.innerHTML = emptyState('Nessuna previsione ancora'); return; }
  el.innerHTML = `<div class="card">
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:700;">✅ +0.5 pts &nbsp;|&nbsp; ❌ −0.5 pts &nbsp;|&nbsp; Tutte le previsioni (storico)</div>
    ${rows.map(([name,v],i)=>{
      const pts = (v.correct * 0.5) - (v.wrong * 0.5);
      const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const ptsCls = pts > 0 ? 'positive' : pts < 0 ? 'negative' : 'zero';
      return `<div class="rank-row">
        <span class="rank-num ${cls}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
        <span class="rank-name">${name}</span>
        <div class="rank-stats">
          <span class="stat-chip pred-pos">✅ ${v.correct}</span>
          <span class="stat-chip pred-neg">❌ ${v.wrong}</span>
          <span class="pred-score ${ptsCls}">${pts>0?'+':''}${pts.toFixed(1)} pts</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderGenerale() {
  const ms = getMatchesForMonth(currentMonth);
  const stats = {};
  for (const p of players) stats[p.name] = { pts: 0 };

  // singolo wins
  ms.filter(x=>x.type==='singolo').forEach(m => {
    if (!stats[m.winner]) stats[m.winner] = { pts:0 };
    stats[m.winner].pts += 1;
  });
  // coppia wins
  ms.filter(x=>x.type==='coppia').forEach(m => {
    [m.winner, m.winner2].filter(Boolean).forEach(p => {
      if (!stats[p]) stats[p] = { pts:0 };
      stats[p].pts += 1;
    });
  });
  // predictions (all time)
  const predStats = getPredictionStats();
  for (const [name, v] of Object.entries(predStats)) {
    if (!stats[name]) stats[name] = { pts:0 };
    stats[name].pts += (v.correct * 0.5) - (v.wrong * 0.5);
  }

  const rows = Object.entries(stats).filter(([,v])=>v.pts!==0).sort((a,b)=>b[1].pts-a[1].pts);
  const el = document.getElementById('tab-generale');
  if (!rows.length) { el.innerHTML = emptyState('Nessun dato ancora'); return; }
  el.innerHTML = `<div class="card">
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:700;">Vittorie = +1 &nbsp;|&nbsp; Previsione ✅ = +0.5 &nbsp;|&nbsp; Previsione ❌ = −0.5</div>
    ${rows.map(([name,v],i)=>{
      const cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
      return `<div class="rank-row">
        <span class="rank-num ${cls}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span>
        <span class="rank-name">${name}</span>
        <div class="rank-stats">
          <span class="stat-chip pts">${v.pts > 0 ? '+' : ''}${v.pts % 1 === 0 ? v.pts : v.pts.toFixed(1)} pts</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderMatches() {
  const ms = getMatchesForMonth(currentMonth).sort((a,b)=>new Date(b.date)-new Date(a.date));

      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">📅 ${formatDate(am.date)} &nbsp;|&nbsp; ${am.type==='singolo'?'1vs1':'2vs2'}</div>
      ${predictorSection}
      <div style="margin-top:10px;">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:700;flex:1;color:var(--yellow)">${team1}</span>
          <span style="font-size:11px;color:var(--muted)">${votesTeam1} voti</span>
        </div>
        <div class="pred-bar"><div class="pred-bar-fill" style="width:${pct1}%"></div></div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:700;flex:1;color:var(--blue)">${team2}</span>
          <span style="font-size:11px;color:var(--muted)">${votesTeam2} voti</span>
        </div>
        <div class="pred-bar"><div class="pred-bar-fill" style="width:${pct2}%;background:var(--blue)"></div></div>
        <div class="pred-count">${total} previsioni totali</div>
      </div>
      ${resolvedInfo}
      ${resolveSection}
    </div>`;
  }).join('');

  // Attach predictor selector events
  announcedMatches.forEach(am => {
    const whoArea = document.getElementById(`pred-who-${am.id}`);
    if (!whoArea) return;
    whoArea.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        whoArea.querySelectorAll('.chip').forEach(c => c.classList.remove('selected-pred'));
        chip.classList.add('selected-pred');
        const voteArea = document.getElementById(`pred-vote-area-${am.id}`);
        if (voteArea) {
          voteArea.style.display = '';
          voteArea.dataset.predictor = chip.dataset.player;
        }
      });
    });

    // Vote buttons
    const voteArea = document.getElementById(`pred-vote-area-${am.id}`);
    if (voteArea) {
      voteArea.querySelectorAll('.pred-vote-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const predictor = voteArea.dataset.predictor;
          if (!predictor) return;
          submitPrediction(am.id, predictor, btn.dataset.winner, am);
        });
      });
    }
  });

  // Resolve buttons
  document.querySelectorAll('.resolve-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const amId = parseInt(btn.dataset.am);
      const winner = btn.dataset.winner;
      resolveMatch(amId, winner);
    });
  });

  // Delete announced match buttons
  document.querySelectorAll('.resolve-section .del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const amId = parseInt(btn.dataset.am);
      deleteAnnounced(amId);
    });
  });
}

function team1Key(am) {
  return [am.player1, am.player2].filter(Boolean).join(' & ');
}
function team2Key(am) {
  return [am.player3, am.player4].filter(Boolean).join(' & ');
}

async function submitPrediction(amId, predictor, winner, am) {
  // Check if this predictor already voted on this match
  const existing = predictions.find(p => p.announced_match_id === amId && p.predictor === predictor);
  if (existing) {
    showToast('Hai già votato per questa partita!', true);
    return;
  }
  // Check not a player
  const isPlaying = [am.player1, am.player2, am.player3, am.player4].filter(Boolean).includes(predictor);
  if (isPlaying) {
    showToast('I giocatori non possono fare previsioni!', true);
    return;
  }

  const now = new Date();
  const month = now.toISOString().slice(0,7);
  await sbPost('predictions', {
    announced_match_id: amId,
    predictor,
    predicted_winner: winner,
    is_correct: null,
    month
  });
  showToast('Previsione registrata! 🎲');
  await loadData();
  renderAnnounced();
}

async function resolveMatch(amId, winner) {
  // Set resolved, resolved_winner on announced_matches
  await sbPatch('announced_matches', amId, { resolved: true, resolved_winner: winner });
  // Update all predictions for this match: is_correct = predicted_winner === winner
  const preds = predictions.filter(p => p.announced_match_id === amId);
  for (const pred of preds) {
    const correct = pred.predicted_winner === winner;
    await sbPatch('predictions', pred.id, { is_correct: correct });
  }
  showToast('Partita risolta! Previsioni aggiornate ✅');
  await loadData();
  renderAnnounced();
  renderAll();
}

async function deleteAnnounced(amId) {
  // delete all predictions for this match
  const preds = predictions.filter(p => p.announced_match_id === amId);
  for (const pred of preds) await sbDelete('predictions', pred.id);
  await sbDelete('announced_matches', amId);
  showToast('Partita annunciata eliminata');
  await loadData();
  renderAnnounced();
}

// ---- ANNOUNCE MODAL ----
let annTeam1Sel = [];
let annTeam2Sel = [];

function openAnnounceModal() {
  annType = 'singolo';
  annTeam1Sel = [];
  annTeam2Sel = [];
  document.getElementById('annTypeBtn-singolo').classList.add('active');
  document.getElementById('annTypeBtn-coppia').classList.remove('active');
  document.getElementById('annDate').value = new Date().toISOString().slice(0,10);
  renderAnnChips();
  document.getElementById('announceModal').classList.add('open');
}

function closeAnnounceModal() {
  document.getElementById('announceModal').classList.remove('open');
}

function setAnnType(t) {
  annType = t;
  annTeam1Sel = [];
  annTeam2Sel = [];
  document.getElementById('annTypeBtn-singolo').classList.toggle('active', t==='singolo');
  document.getElementById('annTypeBtn-coppia').classList.toggle('active', t==='coppia');
  document.getElementById('annTeam1Label').textContent = t==='singolo' ? 'Squadra A (1 giocatore)' : 'Squadra A (max 2)';
  document.getElementById('annTeam2Label').textContent = t==='singolo' ? 'Squadra B (1 giocatore)' : 'Squadra B (max 2)';
  renderAnnChips();
}

function renderAnnChips() {
  const maxPer = annType === 'singolo' ? 1 : 2;
  const t1El = document.getElementById('annTeam1Chips');
  const t2El = document.getElementById('annTeam2Chips');

  const allSelected = [...annTeam1Sel, ...annTeam2Sel];

  t1El.innerHTML = players.map(p => {
    const inT1 = annTeam1Sel.includes(p.name);
    const inT2 = annTeam2Sel.includes(p.name);
    const full = annTeam1Sel.length >= maxPer && !inT1;
    const cls = inT1 ? 'selected-win' : (inT2||full) ? 'disabled' : '';
    return `<button class="chip ${cls}" data-player="${p.name}" data-team="1">${p.name}</button>`;
  }).join('');

  t2El.innerHTML = players.map(p => {
    const inT2 = annTeam2Sel.includes(p.name);
    const inT1 = annTeam1Sel.includes(p.name);
    const full = annTeam2Sel.length >= maxPer && !inT2;
    const cls = inT2 ? 'selected-win' : (inT1||full) ? 'disabled' : '';
    return `<button class="chip ${cls}" data-player="${p.name}" data-team="2">${p.name}</button>`;
  }).join('');

  t1El.querySelectorAll('.chip:not(.disabled)').forEach(c => {
    c.addEventListener('click', () => {
      const p = c.dataset.player;
      if (annTeam1Sel.includes(p)) annTeam1Sel = annTeam1Sel.filter(x=>x!==p);
      else if (annTeam1Sel.length < maxPer) annTeam1Sel.push(p);
      renderAnnChips();
    });
  });
  t2El.querySelectorAll('.chip:not(.disabled)').forEach(c => {
    c.addEventListener('click', () => {
      const p = c.dataset.player;
      if (annTeam2Sel.includes(p)) annTeam2Sel = annTeam2Sel.filter(x=>x!==p);
      else if (annTeam2Sel.length < maxPer) annTeam2Sel.push(p);
      renderAnnChips();
    });
  });
}

async function submitAnnounce() {
  const maxPer = annType === 'singolo' ? 1 : 2;
  if (annTeam1Sel.length !== maxPer || annTeam2Sel.length !== maxPer) {
    showToast(`Seleziona ${maxPer} giocatore/i per squadra`, true);
    return;
  }
  const date = document.getElementById('annDate').value;
  if (!date) { showToast('Inserisci una data', true); return; }
  const now = new Date();
  const month = now.toISOString().slice(0,7);
  await sbPost('announced_matches', {
    player1: annTeam1Sel[0] || null,
    player2: annTeam1Sel[1] || null,
    player3: annTeam2Sel[0] || null,
    player4: annTeam2Sel[1] || null,
    type: annType,
    date,
    month,
    resolved: false,
    resolved_winner: null
  });
  closeAnnounceModal();
  showToast('Partita annunciata! 🎲');
  await loadData();
  renderAnnounced();
}

// ---- REGISTER MATCH ----
function setType(t) {
  matchType = t;
  selectedWinners = [];
  selectedLosers = [];
  document.getElementById('typeBtn-singolo').classList.toggle('active', t==='singolo');
  document.getElementById('typeBtn-coppia').classList.toggle('active', t==='coppia');
  document.getElementById('winnerLabel').textContent = t==='singolo' ? 'Vincitore' : 'Vincitori (2)';
  document.getElementById('loserLabel').textContent = t==='singolo' ? 'Perdente' : 'Perdenti (2)';
  renderRegisterChips();
}

function renderRegisterChips() {
  const maxW = matchType === 'singolo' ? 1 : 2;
  const maxL = matchType === 'singolo' ? 1 : 2;

  const wEl = document.getElementById('winnerChips');
  const lEl = document.getElementById('loserChips');

  wEl.innerHTML = players.map(p => {
    const inW = selectedWinners.includes(p.name);
    const inL = selectedLosers.includes(p.name);
    const full = selectedWinners.length >= maxW && !inW;
    const cls = inW ? 'selected-win' : (inL||full) ? 'disabled' : '';
    return `<button class="chip ${cls}" data-player="${p.name}" data-role="win">${p.name}</button>`;
  }).join('');

  lEl.innerHTML = players.map(p => {
    const inL = selectedLosers.includes(p.name);
    const inW = selectedWinners.includes(p.name);
    const full = selectedLosers.length >= maxL && !inL;
    const cls = inL ? 'selected-lose' : (inW||full) ? 'disabled' : '';
    return `<button class="chip ${cls}" data-player="${p.name}" data-role="lose">${p.name}</button>`;
  }).join('');

  wEl.querySelectorAll('.chip:not(.disabled)').forEach(c => {
    c.addEventListener('click', () => {
      const p = c.dataset.player;
      if (selectedWinners.includes(p)) selectedWinners = selectedWinners.filter(x=>x!==p);
      else if (selectedWinners.length < maxW) selectedWinners.push(p);
      renderRegisterChips();
      updatePreview();
    });
  });
  lEl.querySelectorAll('.chip:not(.disabled)').forEach(c => {
    c.addEventListener('click', () => {
      const p = c.dataset.player;
      if (selectedLosers.includes(p)) selectedLosers = selectedLosers.filter(x=>x!==p);
      else if (selectedLosers.length < maxL) selectedLosers.push(p);
      renderRegisterChips();
      updatePreview();
    });
  });
  updatePreview();
}

function updatePreview() {
  const maxW = matchType === 'singolo' ? 1 : 2;
  const maxL = matchType === 'singolo' ? 1 : 2;
  const pg = document.getElementById('previewGroup');
  const pb = document.getElementById('previewBox');
  if (selectedWinners.length === maxW && selectedLosers.length === maxL) {
    pg.style.display = '';
    pb.innerHTML = `🏆 <strong>${selectedWinners.join(' & ')}</strong> ha battuto <strong>${selectedLosers.join(' & ')}</strong><br><span style="font-size:11px;opacity:0.7">${matchType === 'singolo' ? '1vs1' : '2vs2'}</span>`;
  } else {
    pg.style.display = 'none';
  }
}

async function submitMatch() {
  const maxW = matchType === 'singolo' ? 1 : 2;
  const maxL = matchType === 'singolo' ? 1 : 2;
  if (selectedWinners.length !== maxW || selectedLosers.length !== maxL) {
    showToast('Seleziona tutti i giocatori', true); return;
  }
  const date = document.getElementById('matchDate').value;
  if (!date) { showToast('Inserisci una data', true); return; }
  const month = date.slice(0,7);
  const body = {
    winner: selectedWinners[0],
    winner2: selectedWinners[1] || null,
    loser: selectedLosers[0],
    loser2: selectedLosers[1] || null,
    date,
    month,
    type: matchType
  };
  document.getElementById('submitMatch').disabled = true;
  await sbPost('matches', body);
  showToast('Partita registrata! ⚽');
  selectedWinners = [];
  selectedLosers = [];
  renderRegisterChips();
  await loadData();
  renderAll();
  document.getElementById('submitMatch').disabled = false;
}

// ---- PLAYERS ----
function renderPlayers() {
  const el = document.getElementById('playersList');
  if (!players.length) { el.innerHTML = emptyState('Nessun giocatore'); return; }
  el.innerHTML = players.map(p =>
    `<div class="rank-row">
      <span class="rank-name">${p.name}</span>
      <button class="del-btn" data-id="${p.id}">Rimuovi</button>
    </div>`
  ).join('');
  el.querySelectorAll('.del-btn').forEach(b => {
    b.addEventListener('click', () => deletePlayer(b.dataset.id));
  });
}

async function addPlayer() {
  const inp = document.getElementById('newPlayerName');
  const name = inp.value.trim();
  if (!name) return;
  await sbPost('players', { name });
  inp.value = '';
  showToast('Giocatore aggiunto!');
  await loadData();
  renderAll();
}

async function deletePlayer(id) {
  await sbDelete('players', id);
  showToast('Giocatore rimosso');
  await loadData();
  renderAll();
}

async function deleteMatch(id) {
  await sbDelete('matches', id);
  showToast('Partita eliminata');
  await loadData();
  renderAll();
}

// ---- LOAD DATA ----
async function loadData() {
  setStatus('SYNC...', false);
  try {
    [players, matches, announcedMatches, predictions] = await Promise.all([
      sbGet('players', 'order=name.asc'),
      sbGet('matches', 'order=date.desc'),
      sbGet('announced_matches', 'order=date.asc'),
      sbGet('predictions', 'order=created_at.desc')
    ]);
    setStatus('LIVE', true);
  } catch(e) {
    setStatus('ERRORE', false);
  }
}

function setStatus(txt, live) {
  document.getElementById('statusText').textContent = txt;
  document.getElementById('liveDot').style.background = live ? 'var(--yellow)' : (txt==='ERRORE' ? 'var(--red)' : 'var(--muted)');
}

function renderAll() {
  renderSingolo();
  renderCoppie();
  renderPerfCoppia();
  renderPrevisioni();
  renderGenerale();
  renderMatches();
  renderAnnounced();
  renderPlayers();
  renderRegisterChips();
}

function emptyState(msg) {
  return `<div class="empty-state"><span class="empty-icon">📭</span>${msg}</div>`;
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}

function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error?' error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ---- INIT ----
document.querySelectorAll('.nav-btn').forEach(b => {
  b.addEventListener('click', () => showSection(b.dataset.section));
});
document.querySelectorAll('.section-tab').forEach(b => {
  b.addEventListener('click', () => showTab(b.dataset.tab));
});

const now = new Date();
currentMonth = now.toISOString().slice(0,7);
document.getElementById('matchDate').value = now.toISOString().slice(0,10);
document.getElementById('annDate').value = now.toISOString().slice(0,10);

renderMonths();

(async () => {
  await loadData();
  renderAll();
})();

// Auto-refresh every 10s
setInterval(async () => {
  await loadData();
  renderAll();
}, 10000);
</script>
