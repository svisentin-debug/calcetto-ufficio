<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>⚽ Calcetto — Websonica × Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--border:#262626;--border2:#333;--text:#f0f0f0;--muted:#666;--yellow:#FFF032;--yellow-dim:rgba(255,240,50,0.10);--red:#ff5252;--red-dim:rgba(255,82,82,0.10);--green:#4ade80;}
    body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,240,50,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,240,50,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

    /* ── BALL ANIMATION ── */
    .ball-wrap{display:flex;align-items:center;justify-content:center;position:relative;width:56px;height:56px;flex-shrink:0;}
    .ball-glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(255,240,50,0.5) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite;}
    .ball-emoji{font-size:36px;line-height:1;position:relative;z-index:1;animation:ballFloat 3s ease-in-out infinite;}
    @keyframes ballFloat{0%,100%{transform:translateY(0px);}50%{transform:translateY(-6px);}}
    @keyframes glowPulse{0%,100%{opacity:0.3;transform:scale(0.85);}50%{opacity:1;transform:scale(1.15);}}

    header{position:relative;z-index:1;border-bottom:1px solid var(--border);padding:20px 20px 0;}
    .header-inner{max-width:640px;margin:0 auto;}
    .collab{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;}
    .title-row{display:flex;align-items:center;gap:14px;}
    .app-title h1{font-size:24px;font-weight:800;color:#fff;letter-spacing:-0.01em;line-height:1.1;}
    .app-title h1 span{color:var(--yellow);}
    .app-subtitle{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-top:3px;}
    .collab-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
    .collab-logos{display:flex;align-items:center;gap:10px;}
    .logo-wbs{height:28px;width:auto;object-fit:contain;border-radius:3px;}
    .logo-google{height:18px;width:auto;object-fit:contain;}
    .collab-x{font-size:13px;font-weight:700;color:var(--muted);}
    .collab-label{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;}
    .sync-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);box-shadow:0 0 8px var(--yellow);transition:all .3s;}
    .sync-dot.syncing{background:#fff;box-shadow:0 0 8px #fff;animation:blink .5s infinite;}
    .sync-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .sync-label{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:600;}
    .sync-time{font-size:9px;color:#333;margin-left:auto;}
    .month-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
    .month-strip::-webkit-scrollbar{display:none;}
    .month-btn{padding:6px 14px;border-radius:6px 6px 0 0;border:1px solid var(--border2);border-bottom:none;background:transparent;color:var(--muted);font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .month-btn.active{border-color:var(--yellow);background:var(--yellow-dim);color:var(--yellow);}
    .nav-tabs{display:flex;border-bottom:1px solid var(--border);max-width:640px;margin:0 auto;padding:0 20px;background:rgba(13,13,13,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;}
    .nav-btn{padding:12px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .nav-btn.active{color:var(--yellow);border-bottom-color:var(--yellow);}
    .wrap{max-width:640px;margin:0 auto;padding:24px 20px 80px;position:relative;z-index:1;}
    .panel{display:none;}.panel.active{display:block;}
    .section-label{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:16px;font-weight:600;}
    .sub-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
    .sub-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Be Vietnam Pro',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .sub-btn.active{border-color:var(--yellow);background:var(--yellow-dim);color:var(--yellow);}
    .card-list{display:flex;flex-direction:column;gap:8px;}
    .rank-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);animation:slideIn .25s ease both;}
    .rank-card.first{background:linear-gradient(135deg,#1a1700,#161616);border-color:rgba(255,240,50,.25);}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .rank-pos{font-size:22px;width:32px;text-align:center;flex-shrink:0;}
    .rank-pos-num{font-size:14px;color:#333;font-weight:700;}
    .rank-info{flex:1;min-width:0;}
    .rank-name{font-size:15px;font-weight:700;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rank-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .rank-stats{display:flex;gap:12px;margin-top:5px;flex-wrap:wrap;}
    .stat{font-size:11px;font-weight:600;}
    .stat-w{color:var(--green);}.stat-l{color:var(--red);}.stat-t{color:#555;}
    .winrate{text-align:right;flex-shrink:0;}
    .winrate-num{font-size:26px;font-weight:800;line-height:1;}
    .winrate-num.high{color:var(--yellow);}.winrate-num.mid{color:#aaa;}.winrate-num.low{color:var(--red);}
    .winrate-label{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-top:2px;text-transform:uppercase;}
    .match-card{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);animation:slideIn .2s ease both;flex-wrap:wrap;}
    .match-date{font-size:11px;color:var(--muted);min-width:50px;flex-shrink:0;font-weight:600;}
    .match-type-badge{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:10px;text-transform:uppercase;flex-shrink:0;}
    .badge-singolo{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,240,50,.3);}
    .badge-coppia{background:rgba(100,160,255,.1);color:#6fa3ff;border:1px solid rgba(100,160,255,.3);}
    .match-players{flex:1;display:flex;align-items:center;gap:6px;font-size:13px;flex-wrap:wrap;}
    .match-winner{color:var(--yellow);font-weight:700;}.match-vs{color:#333;font-size:10px;font-weight:700;}.match-loser{color:var(--red);font-weight:600;}
    .btn-del{background:transparent;border:none;color:#333;cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:4px;transition:color .15s;flex-shrink:0;}
    .btn-del:hover{color:var(--red);}
    .form-group{margin-bottom:22px;}
    .form-label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;font-weight:700;}
    .form-label.yellow{color:var(--yellow);}.form-label.red{color:var(--red);}.form-label.muted{color:var(--muted);}
    .type-selector{display:flex;gap:10px;}
    .type-btn{flex:1;padding:14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--muted);font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
    .type-btn .type-icon{font-size:24px;display:block;margin-bottom:4px;}
    .type-btn.active-singolo{border-color:var(--yellow);background:var(--yellow-dim);color:var(--yellow);}
    .type-btn.active-coppia{border-color:#6fa3ff;background:rgba(100,160,255,.08);color:#6fa3ff;}
    input[type=date],input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px 14px;font-size:14px;font-family:'Be Vietnam Pro',sans-serif;outline:none;transition:border-color .15s;font-weight:500;}
    input[type=date]:focus,input[type=text]:focus{border-color:var(--yellow);}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;}
    input[type=text]::placeholder{color:#333;}
    .player-grid{display:flex;flex-wrap:wrap;gap:8px;}
    .player-chip{padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:#777;font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
    .chip-w{border-color:var(--yellow);background:var(--yellow-dim);color:var(--yellow);font-weight:700;}
    .chip-l{border-color:var(--red);background:var(--red-dim);color:var(--red);font-weight:700;}
    .match-preview{padding:14px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);text-align:center;font-size:14px;margin-bottom:20px;font-weight:600;line-height:1.8;}
    .btn-submit{width:100%;padding:14px;border-radius:10px;border:none;background:var(--yellow);color:#0d0d0d;font-family:'Be Vietnam Pro',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .btn-submit:hover{background:#fffa5a;transform:translateY(-1px);}
    .btn-submit:disabled{background:var(--bg3);color:#333;cursor:not-allowed;transform:none;}
    .add-row{display:flex;gap:8px;margin-bottom:20px;}
    .add-row input{flex:1;width:auto;}
    .btn-add{padding:10px 18px;border-radius:8px;border:none;background:var(--yellow);color:#0d0d0d;font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
    .btn-add:hover{background:#fffa5a;}
    .player-row-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);margin-bottom:8px;}
    .info-box{margin-top:20px;padding:14px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);font-size:11px;color:var(--muted);line-height:1.9;font-weight:500;}
    .empty{text-align:center;padding:56px 0;color:var(--muted);font-size:13px;line-height:2;}
    .empty span{color:var(--yellow);cursor:pointer;}
    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:10px;font-family:'Be Vietnam Pro',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}
    #toast.ok{background:#1a1600;border:1px solid var(--yellow);color:var(--yellow);}
    #toast.err{background:#1a0000;border:1px solid var(--red);color:var(--red);}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;font-family:'Be Vietnam Pro',sans-serif;font-size:12px;letter-spacing:.12em;color:var(--muted);font-weight:600;}
    #loading.hidden{display:none;}
    .loader-ball{font-size:48px;animation:bounce 1s ease-in-out infinite;}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    .err-msg{color:var(--red);font-size:12px;margin-top:8px;max-width:300px;text-align:center;}
    @media(max-width:420px){.nav-btn{padding:12px 9px;font-size:10px;}.app-title h1{font-size:20px;}.ball-emoji{font-size:28px;}}
  </style>
</head>

</div>

<script>

var SUPABASE_URL = 'https://jevopxjmiiaawdhypqlk.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impldm9weGptaWlhYXdkaHlwcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDg2OTUsImV4cCI6MjA5MjQyNDY5NX0.ewfz1DQRM1YKE-Vl0864VkQ2rWfdzA13_mdW1gCsjQ0';
var POLL_MS = 10000;
var players = [], matches = [];
var selectedMonth = monthKey(new Date());
var currentTab = 'standings', currentView = 'singolo', currentType = null;
var sel = { w1:'', w2:'', l1:'', l2:'' };

function monthKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(k) {
  var p = k.split('-');
  return new Date(parseInt(p[0]), parseInt(p[1])-1, 1).toLocaleDateString('it-IT', {month:'long', year:'numeric'});
}
function fmtDate(s) { return new Date(s+'T12:00:00').toLocaleDateString('it-IT', {day:'2-digit', month:'short'}); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function sbFetch(path, method, body) {
  var opts = { method: method || 'GET', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPABASE_URL + '/rest/v1/' + path, opts).then(function(res) {
    return res.text().then(function(txt) { if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + txt); return txt ? JSON.parse(txt) : null; });
  });
}

function fetchAll() {
  return Promise.all([sbFetch('matches?select=*&order=created_at.desc'), sbFetch('players?select=*&order=created_at.asc')]).then(function(r) {
    matches = r[0] || []; players = (r[1] || []).map(function(x) { return x.name; });
  });
}

function setSyncing(on) { document.getElementById('syncDot').className = 'sync-dot' + (on ? ' syncing' : ''); document.getElementById('syncLabel').textContent = on ? 'SYNC...' : 'LIVE'; }
function setConnError() { document.getElementById('syncDot').className = 'sync-dot error'; document.getElementById('syncLabel').textContent = 'ERRORE'; }
function updTime() { document.getElementById('syncTime').textContent = new Date().toLocaleTimeString('it-IT'); }

function load(showSync) {
  if (showSync) setSyncing(true);
  return fetchAll().then(function() { updTime(); setSyncing(false); renderAll(); }).catch(function(e) { console.error('Load error:', e.message); setConnError(); throw e; });
}

function renderAll() { renderMonths(); renderStandings(); renderMatches(); renderPlayerGrids(); renderPlayerList(); }

function renderMonths() {
  var seen = {}, allM = [monthKey(new Date())]; seen[allM[0]] = true;
  matches.forEach(function(m) { if (!seen[m.month]) { seen[m.month]=true; allM.push(m.month); } });
  allM.sort(function(a,b) { return b > a ? 1 : -1; });
  document.getElementById('monthStrip').innerHTML = allM.map(function(m) {
    return '<button class="month-btn' + (m===selectedMonth?' active':'') + '" data-month="' + m + '">' + monthLabel(m).toUpperCase() + '</button>';
  }).join('');
  document.getElementById('monthStrip').onclick = function(e) { var b = e.target.closest('.month-btn'); if (b) { selectedMonth = b.dataset.month; renderAll(); } };
}

var MEDALS = ['🥇','🥈','🥉'];

function buildStats(arr, initPlayers) {
  var stats = {};
  if (initPlayers) initPlayers.forEach(function(p) { stats[p] = {w:0,l:0}; });
  arr.forEach(function(item) {
    var ws = Array.isArray(item.ws) ? item.ws : [item.ws];
    var ls = Array.isArray(item.ls) ? item.ls : [item.ls];
    ws.forEach(function(p) { if (p) { if (!stats[p]) stats[p]={w:0,l:0}; stats[p].w++; } });
    ls.forEach(function(p) { if (p) { if (!stats[p]) stats[p]={w:0,l:0}; stats[p].l++; } });
  });
  return Object.keys(stats).map(function(n) { var s=stats[n], t=s.w+s.l; return {name:n,w:s.w,l:s.l,tot:t,avg:t>0?s.w/t:0}; })
    .filter(function(p){return p.tot>0;}).sort(function(a,b){return b.w-a.w||b.avg-a.avg;});
}

function rankCardHTML(p, i, sub) {
  var pct = Math.round(p.avg*100);
  var cls = p.avg>0.5?'high':p.avg<0.5?'low':'mid';
  var medal = i<3 ? MEDALS[i] : '<span class="rank-pos-num">'+(i+1)+'</span>';
  return '<div class="rank-card'+(i===0?' first':'')+'">'+
    '<div class="rank-pos">'+medal+'</div>'+
    '<div class="rank-info"><div class="rank-name">'+esc(p.name)+'</div>'+(sub?'<div class="rank-sub">'+sub+'</div>':'')+
    '<div class="rank-stats"><span class="stat stat-w">&#10003; '+p.w+' vinte</span><span class="stat stat-l">&#10007; '+p.l+' perse</span><span class="stat stat-t">'+p.tot+' tot</span></div></div>'+
    '<div class="winrate"><div class="winrate-num '+cls+'">'+pct+'%</div><div class="winrate-label">Win Rate</div></div></div>';
}

function renderStandings() {
  var mm = matches.filter(function(m){return m.month===selectedMonth;});
  document.getElementById('standingsLabel').textContent = monthLabel(selectedMonth) + ' \u2014 ' + mm.length + ' partite';
  var list, html, items;
  if (currentView==='singolo') {
    items = mm.filter(function(m){return m.type==='singolo';}).map(function(m){return{ws:m.winner,ls:m.loser};});
    list = buildStats(items, players);
    html = list.length ? list.map(function(p,i){return rankCardHTML(p,i,'');}).join('') : '<div class="empty">Nessuna partita singolo.<br><span onclick="switchTab(\'add\')">Registra! \u2192</span></div>';
  } else if (currentView==='coppia') {
    var cs={}; mm.filter(function(m){return m.type==='coppia';}).forEach(function(m){ var wk=[m.winner,m.winner2].sort().join(' & '), lk=[m.loser,m.loser2].sort().join(' & '); if(!cs[wk])cs[wk]={w:0,l:0}; if(!cs[lk])cs[lk]={w:0,l:0}; cs[wk].w++; cs[lk].l++; });
    list = Object.keys(cs).map(function(n){var s=cs[n],t=s.w+s.l;return{name:n,w:s.w,l:s.l,tot:t,avg:t>0?s.w/t:0};}).filter(function(p){return p.tot>0;}).sort(function(a,b){return b.w-a.w||b.avg-a.avg;});
    html = list.length ? list.map(function(p,i){return rankCardHTML(p,i,'');}).join('') : '<div class="empty">Nessuna partita in coppia.</div>';
  } else if (currentView==='perf-coppia') {
    items = mm.filter(function(m){return m.type==='coppia';}).map(function(m){return{ws:[m.winner,m.winner2],ls:[m.loser,m.loser2]};});
    list = buildStats(items, players);
    html = list.length ? list.map(function(p,i){return rankCardHTML(p,i,'Perf. in coppia');}).join('') : '<div class="empty">Nessuna partita in coppia.</div>';
  } else {
    items = mm.map(function(m){return m.type==='coppia'?{ws:[m.winner,m.winner2],ls:[m.loser,m.loser2]}:{ws:m.winner,ls:m.loser};});
    list = buildStats(items, players);
    html = list.length ? list.map(function(p,i){return rankCardHTML(p,i,'Singolo + Coppia');}).join('') : '<div class="empty">Nessuna partita questo mese.</div>';
  }
  document.getElementById('standingsList').innerHTML = html;
}

function renderMatches() {
  var mm = matches.filter(function(m){return m.month===selectedMonth;}).sort(function(a,b){return b.date>a.date?1:-1;});
  document.getElementById('matchesLabel').textContent = monthLabel(selectedMonth) + ' \u2014 storico partite';
  if (!mm.length) { document.getElementById('matchList').innerHTML='<div class="empty">Nessuna partita questo mese.</div>'; return; }
  document.getElementById('matchList').innerHTML = mm.map(function(m) {
    var isCoppia=m.type==='coppia';
    var wL=isCoppia?esc(m.winner)+' & '+esc(m.winner2):esc(m.winner);
    var lL=isCoppia?esc(m.loser)+' & '+esc(m.loser2):esc(m.loser);
    return '<div class="match-card"><div class="match-date">'+fmtDate(m.date)+'</div>'+
      '<span class="match-type-badge '+(isCoppia?'badge-coppia':'badge-singolo')+'">'+(isCoppia?'2vs2':'1vs1')+'</span>'+
      '<div class="match-players"><span class="match-winner">'+wL+'</span><span class="match-vs">VS</span><span class="match-loser">'+lL+'</span></div>'+
      '<button class="btn-del" data-id="'+m.id+'">\u00d7</button></div>';
  }).join('');
  document.getElementById('matchList').onclick = function(e) { var b=e.target.closest('.btn-del'); if(b) deleteMatch(parseInt(b.dataset.id)); };
}

function selectType(type) {
  currentType=type;
  document.getElementById('typeSingolo').className='type-btn'+(type==='singolo'?' active-singolo':'');
  document.getElementById('typeCoppia').className='type-btn'+(type==='coppia'?' active-coppia':'');
  document.getElementById('playersSection').style.display='block';
  document.getElementById('winner2Group').style.display=type==='coppia'?'block':'none';
  document.getElementById('loser2Group').style.display=type==='coppia'?'block':'none';
  document.getElementById('winner1Label').textContent=type==='coppia'?'🏆 Vincitore 1°':'🏆 Vincitore';
  document.getElementById('loser1Label').textContent=type==='coppia'?'💀 Perdente 1°':'💀 Perdente';
  sel={w1:'',w2:'',l1:'',l2:''}; renderPlayerGrids(); updatePreview();
}

function chipClass(p) { if(p===sel.w1||p===sel.w2) return ' chip-w'; if(p===sel.l1||p===sel.l2) return ' chip-l'; return ''; }

function renderPlayerGrids() {
  var grids={winner1Grid:'w1',winner2Grid:'w2',loser1Grid:'l1',loser2Grid:'l2'};
  Object.keys(grids).forEach(function(id) {
    var el=document.getElementById(id); if(!el) return;
    var key=grids[id];
    el.innerHTML=players.map(function(p){ return '<button class="player-chip'+chipClass(p)+'" data-grid="'+id+'" data-name="'+esc(p)+'">'+esc(p)+'</button>'; }).join('');
    el.onclick=function(e){ var b=e.target.closest('.player-chip'); if(!b) return; sel[key]=b.dataset.name; renderPlayerGrids(); updatePreview(); };
  });
}

function updatePreview() {
  var preview=document.getElementById('matchPreview'), btn=document.getElementById('btnSubmit');
  var isCoppia=currentType==='coppia', valid=false, html='';
  if(isCoppia&&sel.w1&&sel.w2&&sel.l1&&sel.l2) {
    valid=(new Set([sel.w1,sel.w2,sel.l1,sel.l2])).size===4;
    html=valid?'<span style="color:var(--yellow);font-weight:700">'+esc(sel.w1)+' &amp; '+esc(sel.w2)+'</span> <span style="color:#444;font-size:11px">battono</span> <span style="color:var(--red);font-weight:700">'+esc(sel.l1)+' &amp; '+esc(sel.l2)+'</span>':'<span style="color:var(--red)">I giocatori devono essere tutti diversi</span>';
  } else if(!isCoppia&&sel.w1&&sel.l1&&sel.w1!==sel.l1) {
    valid=true; html='<span style="color:var(--yellow);font-weight:700">'+esc(sel.w1)+'</span> <span style="color:#444;font-size:11px">batte</span> <span style="color:var(--red);font-weight:700">'+esc(sel.l1)+'</span>';
  } else if(sel.w1||sel.w2||sel.l1||sel.l2) { html='<span style="color:#444">Seleziona tutti i giocatori...</span>'; }
  preview.style.display=(sel.w1||sel.w2||sel.l1||sel.l2)?'block':'none';
  preview.innerHTML=html; btn.disabled=!valid;
}

function addMatch() {
  var dateVal=document.getElementById('matchDate').value;
  if(!dateVal){showToast('Seleziona una data','err');return;}
  if(!currentType){showToast('Seleziona il tipo di partita','err');return;}
  var month=monthKey(new Date(dateVal+'T12:00:00')), isCoppia=currentType==='coppia';
  var body={winner:sel.w1,loser:sel.l1,date:dateVal,month:month,type:currentType};
  if(isCoppia){body.winner2=sel.w2;body.loser2=sel.l2;}
  setSyncing(true);
  sbFetch('matches','POST',body).then(function(){
    sel={w1:'',w2:'',l1:'',l2:''}; currentType=null;
    document.getElementById('typeSingolo').className='type-btn';
    document.getElementById('typeCoppia').className='type-btn';
    document.getElementById('playersSection').style.display='none';
    document.getElementById('matchPreview').style.display='none';
    document.getElementById('btnSubmit').disabled=true;
    return load(false);
  }).then(function(){ selectedMonth=month; renderMonths(); showToast('Partita registrata! ⚽'); switchTab('standings'); })
  .catch(function(e){ setConnError(); showToast('Errore: '+e.message,'err'); });
}

function deleteMatch(id) {
  setSyncing(true);
  sbFetch('matches?id=eq.'+id,'DELETE').then(function(){return load(false);}).then(function(){showToast('Partita rimossa');}).catch(function(){setConnError();showToast('Errore','err');});
}

function renderPlayerList() {
  document.getElementById('playerList').innerHTML=players.map(function(p){
    return '<div class="player-row-item"><span style="font-size:14px;font-weight:600">⚽ '+esc(p)+'</span><button class="btn-del" data-name="'+esc(p)+'">\u00d7</button></div>';
  }).join('');
  document.getElementById('playerList').onclick=function(e){var b=e.target.closest('.btn-del');if(b)removePlayer(b.dataset.name);};
}

function addPlayer() {
  var name=document.getElementById('newPlayerName').value.trim();
  if(!name) return;
  if(players.indexOf(name)>=0){showToast('Giocatore già presente','err');return;}
  setSyncing(true);
  sbFetch('players','POST',{name:name}).then(function(){document.getElementById('newPlayerName').value='';return load(false);}).then(function(){showToast(name+' aggiunto!');}).catch(function(){setConnError();showToast('Errore','err');});
}

function removePlayer(name) {
  setSyncing(true);
  sbFetch('players?name=eq.'+encodeURIComponent(name),'DELETE').then(function(){return load(false);}).then(function(){showToast(name+' rimosso');}).catch(function(){setConnError();showToast('Errore','err');});
}

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+tab).classList.add('active');
  var tabs=['standings','matches','add','manage'];
  document.querySelectorAll('.nav-btn').forEach(function(b,i){b.classList.toggle('active',tabs[i]===tab);});
}

function switchView(view) {
  currentView=view;
  var views=['singolo','coppia','perf-coppia','generale'];
  document.querySelectorAll('.sub-btn').forEach(function(b,i){b.classList.toggle('active',views[i]===view);});
  renderStandings();
}

var toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer); var el=document.getElementById('toast');
  el.textContent=msg; el.className=type||'ok'; void el.offsetWidth; el.classList.add('show');
  toastTimer=setTimeout(function(){el.classList.remove('show');},2500);
}

document.getElementById('matchDate').value=new Date().toISOString().slice(0,10);
document.getElementById('newPlayerName').addEventListener('keydown',function(e){if(e.key==='Enter')addPlayer();});

load(true).then(function(){
  document.getElementById('loading').classList.add('hidden');
  setInterval(function(){load(false);},POLL_MS);
}).catch(function(e){
  document.getElementById('loadingText').textContent='ERRORE DI CONNESSIONE';
  document.getElementById('loadingErr').style.display='block';
  document.getElementById('loadingErr').textContent=e.message;
});

</script>
</body>
</html>
