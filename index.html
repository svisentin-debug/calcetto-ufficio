<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Calcetto — Websonica × Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --bg2: #161616;
      --bg3: #1e1e1e;
      --border: #262626;
      --border2: #333;
      --text: #f0f0f0;
      --muted: #666;
      --yellow: #FFF032;
      --yellow-dim: rgba(255,240,50,0.10);
      --yellow-dim2: rgba(255,240,50,0.06);
      --red: #ff5252;
      --red-dim: rgba(255,82,82,0.10);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.10);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,240,50,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,240,50,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 1;
      background: linear-gradient(180deg, #111 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 0;
    }
    .header-inner { max-width: 640px; margin: 0 auto; }

    /* collab logos */
    .collab {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .collab-logos {
      display: flex; align-items: center; gap: 12px;
    }
    .collab-logo { height: 28px; width: auto; object-fit: contain; }
    .collab-logo.wbs { filter: brightness(0) invert(1); }
    .collab-logo.google { height: 22px; }
    .collab-x {
      font-size: 16px; font-weight: 700; color: var(--muted);
      margin: 0 2px; line-height: 1;
    }
    .collab-label {
      font-size: 9px; letter-spacing: 0.16em; color: var(--muted);
      text-transform: uppercase; text-align: right;
    }

    .app-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .app-title h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -0.01em; color: #fff;
    }
    .app-title h1 span { color: var(--yellow); }
    .app-subtitle {
      font-size: 10px; letter-spacing: 0.14em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 18px;
    }

    .sync-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--yellow); box-shadow: 0 0 8px var(--yellow);
      transition: all .3s;
    }
    .sync-dot.syncing { background: #fff; box-shadow: 0 0 8px #fff; animation: blink .5s infinite; }
    .sync-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .sync-label { font-size: 10px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
    .sync-time { font-size: 9px; color: #333; margin-left: auto; }

    /* ── MONTH STRIP ── */
    .month-strip {
      display: flex; gap: 6px; overflow-x: auto; padding: 0;
      max-width: 640px; margin: 0 auto;
      scrollbar-width: none; position: relative; z-index: 1;
    }
    .month-strip::-webkit-scrollbar { display: none; }
    .month-btn {
      padding: 6px 14px; border-radius: 6px 6px 0 0;
      border: 1px solid var(--border2); border-bottom: none;
      background: transparent; color: var(--muted);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 11px; font-weight: 500; letter-spacing: .06em;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .month-btn.active {
      border-color: var(--yellow); background: var(--yellow-dim);
      color: var(--yellow);
    }

    /* ── NAV TABS ── */
    .nav-tabs {
      display: flex; border-bottom: 1px solid var(--border);
      max-width: 640px; margin: 0 auto; padding: 0 20px;
      background: rgba(13,13,13,.9); backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-btn {
      padding: 12px 14px; border: none;
      border-bottom: 2px solid transparent;
      background: transparent; color: var(--muted);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .nav-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

    /* ── WRAP ── */
    .wrap { max-width: 640px; margin: 0 auto; padding: 24px 20px 80px; position: relative; z-index: 1; }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }
    .section-label {
      font-size: 10px; letter-spacing: .14em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 16px; font-weight: 500;
    }

    /* ── CLASSIFICA SUB-TABS ── */
    .sub-tabs {
      display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .sub-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .sub-btn.active {
      border-color: var(--yellow); background: var(--yellow-dim);
      color: var(--yellow);
    }

    /* ── CARDS ── */
    .card-list { display: flex; flex-direction: column; gap: 8px; }

    .rank-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg2);
      animation: slideIn .25s ease both;
      transition: border-color .2s;
    }
    .rank-card:nth-child(1) { animation-delay: .04s; }
    .rank-card:nth-child(2) { animation-delay: .08s; }
    .rank-card:nth-child(3) { animation-delay: .12s; }
    .rank-card:nth-child(n+4) { animation-delay: .16s; }
    .rank-card.first {
      background: linear-gradient(135deg, #1a1700, #161616);
      border-color: rgba(255,240,50,.25);
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .rank-pos { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
    .rank-pos-num { font-size: 14px; color: #333; font-weight: 700; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 15px; font-weight: 700; color: #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .rank-stats { display: flex; gap: 12px; margin-top: 5px; flex-wrap: wrap; }
    .stat { font-size: 11px; font-weight: 500; }
    .stat-w { color: var(--green); }
    .stat-l { color: var(--red); }
    .stat-t { color: #555; }

    .winrate { text-align: right; flex-shrink: 0; }
    .winrate-num {
      font-size: 26px; font-weight: 800; line-height: 1;
      letter-spacing: -.02em;
    }
    .winrate-num.high { color: var(--yellow); }
    .winrate-num.mid { color: #aaa; }
    .winrate-num.low { color: var(--red); }
    .winrate-label { font-size: 9px; color: var(--muted); letter-spacing: .1em; margin-top: 2px; text-transform: uppercase; }

    /* ── MATCHES ── */
    .match-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg2);
      animation: slideIn .2s ease both;
    }
    .match-date { font-size: 11px; color: var(--muted); min-width: 52px; flex-shrink: 0; font-weight: 500; }
    .match-type-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .08em;
      padding: 2px 7px; border-radius: 10px;
      text-transform: uppercase; flex-shrink: 0;
    }
    .match-type-badge.singolo { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,240,50,.3); }
    .match-type-badge.coppia { background: rgba(100,160,255,.1); color: #6fa3ff; border: 1px solid rgba(100,160,255,.3); }
    .match-players { flex: 1; display: flex; align-items: center; gap: 6px; font-size: 13px; flex-wrap: wrap; }
    .match-winner { color: var(--yellow); font-weight: 700; }
    .match-vs { color: #333; font-size: 10px; font-weight: 600; }
    .match-loser { color: var(--red); font-weight: 500; }
    .btn-del {
      background: transparent; border: none; color: #333;
      cursor: pointer; font-size: 20px; line-height: 1; padding: 2px 6px;
      border-radius: 4px; transition: color .15s; flex-shrink: 0;
    }
    .btn-del:hover { color: var(--red); }

    /* ── FORM ── */
    .form-group { margin-bottom: 22px; }
    .form-label {
      display: block; font-size: 10px; letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 8px; font-weight: 600;
    }
    .form-label.yellow { color: var(--yellow); }
    .form-label.red { color: var(--red); }
    .form-label.muted { color: var(--muted); }

    /* type selector */
    .type-selector { display: flex; gap: 10px; }
    .type-btn {
      flex: 1; padding: 14px; border-radius: 10px;
      border: 1px solid var(--border2); background: var(--bg2);
      color: var(--muted); font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
      text-align: center;
    }
    .type-btn .type-icon { font-size: 24px; display: block; margin-bottom: 4px; }
    .type-btn.active-singolo {
      border-color: var(--yellow); background: var(--yellow-dim); color: var(--yellow);
    }
    .type-btn.active-coppia {
      border-color: #6fa3ff; background: rgba(100,160,255,.08); color: #6fa3ff;
    }

    input[type="date"] {
      width: 100%; background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); padding: 10px 14px;
      font-size: 14px; font-family: 'Be Vietnam Pro', sans-serif; outline: none;
      transition: border-color .15s; font-weight: 500;
    }
    input[type="date"]:focus { border-color: var(--yellow); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.5); cursor: pointer; }

    .player-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .player-chip {
      padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border2);
      background: var(--bg2); color: #777;
      font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all .15s;
    }
    .player-chip.sel-w1, .player-chip.sel-w2 {
      border-color: var(--yellow); background: var(--yellow-dim); color: var(--yellow); font-weight: 700;
    }
    .player-chip.sel-l1, .player-chip.sel-l2 {
      border-color: var(--red); background: var(--red-dim); color: var(--red); font-weight: 700;
    }
    .player-chip:disabled { opacity: .4; cursor: not-allowed; }

    .match-preview {
      padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border2);
      background: var(--bg3); text-align: center; font-size: 14px;
      margin-bottom: 20px; animation: fadeIn .2s ease; font-weight: 500;
      line-height: 1.8;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .btn-submit {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--yellow); color: #0d0d0d;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 13px; font-weight: 800; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer; transition: all .2s;
    }
    .btn-submit:hover { background: #fffa5a; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled {
      background: var(--bg3); color: #333; cursor: not-allowed; transform: none;
    }

    /* ── MANAGE ── */
    .add-row { display: flex; gap: 8px; margin-bottom: 20px; }
    input[type="text"] {
      flex: 1; background: var(--bg2); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text); padding: 10px 14px;
      font-size: 14px; font-family: 'Be Vietnam Pro', sans-serif; outline: none;
      transition: border-color .15s; font-weight: 500;
    }
    input[type="text"]:focus { border-color: var(--yellow); }
    input[type="text"]::placeholder { color: #333; }
    .btn-add {
      padding: 10px 18px; border-radius: 8px; border: none;
      background: var(--yellow); color: #0d0d0d;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 12px; font-weight: 800; cursor: pointer; white-space: nowrap;
      transition: all .15s;
    }
    .btn-add:hover { background: #fffa5a; }
    .player-row-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2);
      margin-bottom: 8px;
    }
    .info-box {
      margin-top: 20px; padding: 14px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2);
      font-size: 11px; color: var(--muted); line-height: 1.9; font-weight: 500;
    }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 56px 0; color: var(--muted); font-size: 13px; line-height: 2; }
    .empty a { color: var(--yellow); cursor: pointer; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px; border-radius: 10px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: .08em;
      box-shadow: 0 8px 32px rgba(0,0,0,.6); z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok { background: #1a1600; border: 1px solid var(--yellow); color: var(--yellow); }
    #toast.err { background: #1a0000; border: 1px solid var(--red); color: var(--red); }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; gap: 16px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 12px; letter-spacing: .12em; color: var(--muted); font-weight: 600;
    }
    .loader-ball { font-size: 48px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

    @media(max-width:420px) {
      .nav-btn { padding: 12px 10px; font-size: 10px; }
      .collab-label { display: none; }
    }
  </style>
</head>

<script>
const SUPABASE_URL = 'https://jevopxjmiiaawdhypqlk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impldm9weGptaWlhYXdkaHlwcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDg2OTUsImV4cCI6MjA5MjQyNDY5NX0.ewfz1DQRM1YKE-Vl0864VkQ2rWfdzA13_mdW1gCsjQ0';
const POLL_MS = 10000;

let players = [], matches = [];
let selectedMonth = monthKey(new Date());
let currentTab = 'standings', currentView = 'singolo', currentType = null;
let sel = { w1:'', w2:'', l1:'', l2:'' };

function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(k) {
  const [y,m] = k.split('-');
  return new Date(+y,+m-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
}
function fmtDate(s) { return new Date(s+'T12:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short'}); }

async function sb(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Content-Type':'application/json', 'Prefer':'return=representation', ...opts.headers },
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text(); return t ? JSON.parse(t) : null;
}

async function fetchAll() {
  const [m,p] = await Promise.all([
    sb('matches?select=*&order=created_at.desc'),
    sb('players?select=*&order=created_at.asc')
  ]);
  matches = m||[]; players = (p||[]).map(r=>r.name);
}

function setSyncing(on) {
  const d=document.getElementById('syncDot'), l=document.getElementById('syncLabel');
  d.className='sync-dot'+(on?' syncing':''); l.textContent=on?'SYNC...":'LIVE';
}
function setError() {
  document.getElementById('syncDot').className='sync-dot error';
  document.getElementById('syncLabel').textContent='ERRORE';
}
function updSyncTime() { document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('it-IT'); }

async function load(showSync=false) {
  if(showSync) setSyncing(true);
  try { await fetchAll(); updSyncTime(); setSyncing(false); renderAll(); }
  catch(e) { setError(); console.error(e); }
}

function renderAll() {
  renderMonths(); renderStandings(); renderMatches(); renderPlayerGrids(); renderPlayerList();
}

function renderMonths() {
  const all = Array.from(new Set([monthKey(new Date()),...matches.map(m=>m.month)])).sort((a,b)=>b.localeCompare(a));
  document.getElementById('monthStrip').innerHTML = all.map(m=>
    `<button class="month-btn ${m===selectedMonth?'active':''}" onclick="selectMonth('${m}')">${monthLabel(m).toUpperCase()}</button>`
  ).join('');
}

// ── STANDINGS ──────────────────────────────────────────────
function renderStandings() {
  const mm = matches.filter(m=>m.month===selectedMonth);
  document.getElementById('standingsLabel').textContent =
    `${monthLabel(selectedMonth)} — ${mm.length} partite`;

  let html = '';
  const medals = ['🥇','🥈','🥉'];

  if (currentView === 'singolo') {
    const sm = mm.filter(m=>m.type==='singolo');
    const stats = {}; players.forEach(p=>{stats[p]={w:0,l:0};});
    sm.forEach(m=>{
      if(!stats[m.winner]) stats[m.winner]={w:0,l:0};
      if(!stats[m.loser])  stats[m.loser]={w:0,l:0};
      stats[m.winner].w++; stats[m.loser].l++;
    });
    const list = Object.entries(stats)
      .map(([n,s])=>({name:n,w:s.w,l:s.l,tot:s.w+s.l,avg:s.w+s.l>0?s.w/(s.w+s.l):0}))
      .filter(p=>p.tot>0).sort((a,b)=>b.w-a.w||b.avg-a.avg);
    html = list.length===0
      ? `<div class="empty">Nessuna partita singolo questo mese.<br><a onclick="switchTab('add')">Registra! →</a></div>`
      : list.map((p,i)=>`<div class="rank-card ${i===0?'first':''}">${rankRow(p,i,medals,p.name)}</div>`).join('');

  } else if (currentView === 'coppia') {
    const cm = mm.filter(m=>m.type==='coppia');
    const stats = {};
    cm.forEach(m=>{
      const wk = [m.winner,m.winner2].sort().join(' & ');
      const lk = [m.loser,m.loser2].sort().join(' & ');
      if(!stats[wk]) stats[wk]={w:0,l:0};
      if(!stats[lk]) stats[lk]={w:0,l:0};
      stats[wk].w++; stats[lk].l++;
    });
    const list = Object.entries(stats)
      .map(([n,s])=>({name:n,w:s.w,l:s.l,tot:s.w+s.l,avg:s.w+s.l>0?s.w/(s.w+s.l):0}))
      .filter(p=>p.tot>0).sort((a,b)=>b.w-a.w||b.avg-a.avg);
    html = list.length===0
      ? `<div class="empty">Nessuna partita in coppia questo mese.</div>`
      : list.map((p,i)=>`<div class="rank-card ${i===0?'first':''}">${rankRow(p,i,medals,p.name)}</div>`).join('');

  } else if (currentView === 'perf-coppia') {
    const cm = mm.filter(m=>m.type==='coppia');
    const stats = {}; players.forEach(p=>{stats[p]={w:0,l:0};});
    cm.forEach(m=>{
      [m.winner,m.winner2].forEach(p=>{ if(p){if(!stats[p])stats[p]={w:0,l:0}; stats[p].w++; }});
      [m.loser,m.loser2].forEach(p=>{ if(p){if(!stats[p])stats[p]={w:0,l:0}; stats[p].l++; }});
    });
    const list = Object.entries(stats)
      .map(([n,s])=>({name:n,w:s.w,l:s.l,tot:s.w+s.l,avg:s.w+s.l>0?s.w/(s.w+s.l):0}))
      .filter(p=>p.tot>0).sort((a,b)=>b.w-a.w||b.avg-a.avg);
    html = list.length===0
      ? `<div class="empty">Nessuna partita in coppia questo mese.</div>`
      : list.map((p,i)=>`<div class="rank-card ${i===0?'first':''}">${rankRow(p,i,medals,p.name,'Perf. personale in coppia')}</div>`).join('');

  } else if (currentView === 'generale') {
    const stats = {}; players.forEach(p=>{stats[p]={w:0,l:0};});
    mm.forEach(m=>{
      const ws = m.type==='coppia' ? [m.winner,m.winner2] : [m.winner];
      const ls = m.type==='coppia' ? [m.loser,m.loser2] : [m.loser];
      ws.forEach(p=>{ if(p){if(!stats[p])stats[p]={w:0,l:0}; stats[p].w++; }});
      ls.forEach(p=>{ if(p){if(!stats[p])stats[p]={w:0,l:0}; stats[p].l++; }});
    });
    const list = Object.entries(stats)
      .map(([n,s])=>({name:n,w:s.w,l:s.l,tot:s.w+s.l,avg:s.w+s.l>0?s.w/(s.w+s.l):0}))
      .filter(p=>p.tot>0).sort((a,b)=>b.w-a.w||b.avg-a.avg);
    html = list.length===0
      ? `<div class="empty">Nessuna partita questo mese.</div>`
      : list.map((p,i)=>`<div class="rank-card ${i===0?'first':''}">${rankRow(p,i,medals,p.name,'Singolo + Coppia')}</div>`).join('');
  }

  document.getElementById('standingsList').innerHTML = html;
}

function rankRow(p, i, medals, name, sub='') {
  const pct = (p.avg*100).toFixed(0);
  const cls = p.avg>0.5?'high':p.avg===0.5?'mid':'low';
  return `
    <div class="rank-pos">${medals[i]??'<span class="rank-pos-num">'+(i+1)+'</span>'}</div>
    <div class="rank-info">
      <div class="rank-name">${name}</div>
      ${sub?`<div class="rank-sub">${sub}</div>`:''}
      <div class="rank-stats">
        <span class="stat stat-w">✓ ${p.w} vinte</span>
        <span class="stat stat-l">✗ ${p.l} perse</span>
        <span class="stat stat-t">${p.tot} tot</span>
      </div>
    </div>
    <div class="winrate">
      <div class="winrate-num ${cls}">${pct}%</div>
      <div class="winrate-label">Win Rate</div>
    </div>`;
}

// ── MATCHES ──────────────────────────────────────────────
function renderMatches() {
  const mm = matches.filter(m=>m.month===selectedMonth).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('matchesLabel').textContent = `${monthLabel(selectedMonth)} — storico partite`;
  if(mm.length===0) {
    document.getElementById('matchList').innerHTML='<div class="empty">Nessuna partita questo mese.</div>'; return;
  }
  document.getElementById('matchList').innerHTML = mm.map(m=>{
    const isCoppia = m.type==='coppia';
    const wLabel = isCoppia ? `${m.winner} & ${m.winner2}` : m.winner;
    const lLabel = isCoppia ? `${m.loser} & ${m.loser2}` : m.loser;
    return `<div class="match-card">
      <div class="match-date">${fmtDate(m.date)}</div>
      <span class="match-type-badge ${m.type||'singolo'}">${isCoppia?'2vs2':'1vs1'}</span>
      <div class="match-players">
        <span class="match-winner">${wLabel}</span>
        <span class="match-vs">VS</span>
        <span class="match-loser">${lLabel}</span>
      </div>
      <button class="btn-del" onclick="deleteMatch(${m.id})">×</button>
    </div>`;
  }).join('');
}

// ── ADD FORM ──────────────────────────────────────────────
function selectType(type) {
  currentType = type;
  document.getElementById('typeSingolo').className = 'type-btn'+(type==='singolo'?' active-singolo':'');
  document.getElementById('typeCoppia').className = 'type-btn'+(type==='coppia'?' active-coppia':'');
  document.getElementById('playersSection').style.display = 'block';
  document.getElementById('winner2Group').style.display = type==='coppia'?'block':'none';
  document.getElementById('loser2Group').style.display  = type==='coppia'?'block':'none';
  document.getElementById('winner1Label').textContent = type==='coppia'?'🏆 Vincitore 1°':'🏆 Vincitore';
  document.getElementById('loser1Label').textContent  = type==='coppia'?'💀 Perdente 1°':'💀 Perdente';
  sel = {w1:'',w2:'',l1:'',l2:''}; renderPlayerGrids(); updatePreview();
}

function renderPlayerGrids() {
  ['winner1Grid','winner2Grid','loser1Grid','loser2Grid'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    el.innerHTML = players.map(p=>{
      let cls='player-chip';
      if(p===sel.w1) cls+=' sel-w1';
      if(p===sel.w2) cls+=' sel-w2';
      if(p===sel.l1) cls+=' sel-l1';
      if(p===sel.l2) cls+=' sel-l2';
      return `<button class="${cls}" onclick="pick('${id}','${p}')">${p}</button>`;
    }).join('');
  });
}

function pick(grid, name) {
  if(grid==='winner1Grid') sel.w1=name;
  if(grid==='winner2Grid') sel.w2=name;
  if(grid==='loser1Grid')  sel.l1=name;
  if(grid==='loser2Grid')  sel.l2=name;
  renderPlayerGrids(); updatePreview();
}

function updatePreview() {
  const preview=document.getElementById('matchPreview');
  const btn=document.getElementById('btnSubmit');
  const isCoppia=currentType==='coppia';
  let valid=false, html='';
  if(isCoppia && sel.w1 && sel.w2 && sel.l1 && sel.l2) {
    const all=[sel.w1,sel.w2,sel.l1,sel.l2];
    const uniq=new Set(all); valid = uniq.size===4;
    if(valid) html=`<span style="color:var(--yellow);font-weight:700">${sel.w1} & ${sel.w2}</span> <span style="color:#333;font-size:11px">battono</span> <span style="color:var(--red);font-weight:700">${sel.l1} & ${sel.l2}</span>`;
    else html=`<span style="color:var(--red)">I giocatori devono essere tutti diversi</span>`;
  } else if(!isCoppia && sel.w1 && sel.l1 && sel.w1!==sel.l1) {
    valid=true;
    html=`<span style="color:var(--yellow);font-weight:700">${sel.w1}</span> <span style="color:#333;font-size:11px">batte</span> <span style="color:var(--red);font-weight:700">${sel.l1}</span>`;
  }
  if(sel.w1||sel.w2||sel.l1||sel.l2||(isCoppia&&currentType)) {
    preview.style.display='block'; preview.innerHTML=html||'<span style="color:#444">Seleziona tutti i giocatori</span>';
  } else preview.style.display='none';
  btn.disabled=!valid;
}

async function addMatch() {
  const dateVal=document.getElementById('matchDate').value;
  if(!dateVal) return showToast('Seleziona una data','err');
  const month=monthKey(new Date(dateVal+'T12:00:00'));
  const isCoppia=currentType==='coppia';
  const body={winner:sel.w1,loser:sel.l1,date:dateVal,month,type:currentType};
  if(isCoppia){body.winner2=sel.w2;body.loser2=sel.l2;}
  setSyncing(true);
  try {
    await sb('matches',{method:'POST',body:JSON.stringify(body)});
    sel={w1:'',w2:'',l1:'',l2:''}; currentType=null;
    document.getElementById('typeSingolo').className='type-btn';
    document.getElementById('typeCoppia').className='type-btn';
    document.getElementById('playersSection').style.display='none';
    document.getElementById('matchPreview').style.display='none';
    document.getElementById('btnSubmit').disabled=true;
    await load(); selectedMonth=month;
    showToast('Partita registrata! ⚽'); switchTab('standings');
  } catch(e) { setError(); showToast('Errore nel salvataggio','err'); }
}

async function deleteMatch(id) {
  setSyncing(true);
  try { await sb(`matches?id=eq.${id}`,{method:'DELETE'}); await load(); showToast('Partita rimossa'); }
  catch(e){ setError(); showToast('Errore','err'); }
}

function renderPlayerList() {
  document.getElementById('playerList').innerHTML=players.map(p=>`
    <div class="player-row-item">
      <span style="font-size:14px;font-weight:500">⚽ ${p}</span>
      <button class="btn-del" onclick="removePlayer('${p}')">×</button>
    </div>`).join('');
}

async function addPlayer() {
  const name=document.getElementById('newPlayerName').value.trim();
  if(!name) return;
  if(players.includes(name)) return showToast('Giocatore già presente','err');
  setSyncing(true);
  try { await sb('players',{method:'POST',body:JSON.stringify({name})}); document.getElementById('newPlayerName').value=''; await load(); showToast(`${name} aggiunto!`); }
  catch(e){ setError(); showToast('Errore','err'); }
}

async function removePlayer(name) {
  setSyncing(true);
  try { await sb(`players?name=eq.${encodeURIComponent(name)}`,{method:'DELETE'}); await load(); showToast(`${name} rimosso`); }
  catch(e){ setError(); showToast('Errore','err'); }
}

function selectMonth(m) { selectedMonth=m; renderAll(); }

function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['standings','matches','add','manage'][i]===tab);
  });
}

function switchView(view) {
  currentView=view;
  document.querySelectorAll('.sub-btn').forEach((b,i)=>{
    b.classList.toggle('active',['singolo','coppia','perf-coppia','generale'][i]===view);
  });
  renderStandings();
}

let toastT;
function showToast(msg,type='ok') {
  clearTimeout(toastT);
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=type; void el.offsetWidth; el.classList.add('show');
  toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

document.getElementById('matchDate').value=new Date().toISOString().slice(0,10);

load(true).then(()=>{
  document.getElementById('loading').style.display='none';
  setInterval(()=>load(),POLL_MS);
});
</script>
</body>
</html>
