<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Calcetto Balilla — Ufficio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c12;
      --bg2: #111420;
      --bg3: #161924;
      --border: #1e2330;
      --border2: #2a2f3e;
      --text: #e2e2d8;
      --muted: #4a5568;
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --yellow: #facc15;
      --accent: #4ade80;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND GRID ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── HEADER ── */
    header {
      padding: 32px 16px 0;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-ball {
      font-size: 40px;
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(74,222,128,0.4));
      animation: pulse-ball 3s ease-in-out infinite;
    }

    @keyframes pulse-ball {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(74,222,128,0.3)); }
      50% { filter: drop-shadow(0 0 20px rgba(74,222,128,0.7)); }
    }

    .logo-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
    }

    .logo-text p {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .sync-badge {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-top: 4px;
    }

    .sync-dot-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      transition: all 0.3s;
    }

    .sync-dot.syncing {
      background: var(--yellow);
      box-shadow: 0 0 8px var(--yellow);
      animation: blink 0.6s ease-in-out infinite;
    }

    .sync-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .sync-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .sync-time { font-size: 9px; color: #2a3040; }

    /* ── MONTH TABS ── */
    .month-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 20px 16px 0;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      scrollbar-width: none;
    }
    .month-strip::-webkit-scrollbar { display: none; }

    .month-btn {
      padding: 6px 14px;
      border-radius: 6px 6px 0 0;
      border: 1px solid var(--border2);
      border-bottom: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .month-btn.active {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
      font-weight: 500;
    }

    /* ── NAV TABS ── */
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      padding: 0 16px;
      background: rgba(10,12,18,0.8);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
    }

    .nav-btn {
      padding: 12px 14px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .nav-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
      font-weight: 500;
    }

    /* ── PANELS ── */
    .panel { display: none; padding-top: 24px; }
    .panel.active { display: block; }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* ── STANDINGS ── */
    .standings-list { display: flex; flex-direction: column; gap: 8px; }

    .standing-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg2);
      transition: border-color 0.2s;
      animation: slideIn 0.3s ease both;
    }

    .standing-card:nth-child(1) { animation-delay: 0.05s; }
    .standing-card:nth-child(2) { animation-delay: 0.1s; }
    .standing-card:nth-child(3) { animation-delay: 0.15s; }
    .standing-card:nth-child(n+4) { animation-delay: 0.2s; }

    @keyframes slideIn {
      from { opacity:0; transform: translateY(10px); }
      to { opacity:1; transform: translateY(0); }
    }

    .standing-card.first {
      background: linear-gradient(135deg, #0f2a18, #111420);
      border-color: rgba(74,222,128,0.3);
    }

    .rank { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
    .rank-num { font-size: 13px; color: #2a3040; font-weight: 500; }

    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 15px; font-weight: 500; color: #f0f0e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-stats { display: flex; gap: 14px; margin-top: 4px; }
    .stat-w { font-size: 11px; color: var(--green); }
    .stat-l { font-size: 11px; color: var(--red); }
    .stat-t { font-size: 11px; color: #94a3b8; }

    .winrate {
      text-align: right;
      flex-shrink: 0;
    }
    .winrate-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0.04em;
    }
    .winrate-num.high { color: var(--green); }
    .winrate-num.mid { color: var(--yellow); }
    .winrate-num.low { color: var(--red); }
    .winrate-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; margin-top: 1px; }

    /* ── MATCHES ── */
    .match-list { display: flex; flex-direction: column; gap: 8px; }

    .match-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      animation: slideIn 0.2s ease both;
    }

    .match-date { font-size: 11px; color: var(--muted); min-width: 52px; flex-shrink: 0; }
    .match-players { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 13px; flex-wrap: wrap; }
    .match-winner { color: var(--green); font-weight: 500; }
    .match-vs { color: #2a3040; font-size: 10px; }
    .match-loser { color: var(--red); }

    .btn-delete {
      background: transparent;
      border: none;
      color: #2a3040;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .btn-delete:hover { color: var(--red); }

    /* ── ADD FORM ── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .form-label.green { color: var(--green); }
    .form-label.red { color: var(--red); }
    .form-label.muted { color: var(--muted); }

    input[type="date"] {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="date"]:focus { border-color: var(--green); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    .player-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .player-chip {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: #8a9ab0;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .player-chip.sel-winner {
      border-color: var(--green);
      background: var(--green-dim);
      color: var(--green);
      font-weight: 500;
    }

    .player-chip.sel-loser {
      border-color: var(--red);
      background: var(--red-dim);
      color: var(--red);
      font-weight: 500;
    }

    .match-preview {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      animation: fadeIn 0.2s ease;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: #0a0c12;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover { background: #6ee7a0; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled {
      background: var(--bg3);
      color: #2a3040;
      cursor: not-allowed;
      transform: none;
    }

    /* ── MANAGE PLAYERS ── */
    .add-player-row { display: flex; gap: 8px; margin-bottom: 20px; }

    input[type="text"] {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--green); }
    input[type="text"]::placeholder { color: #2a3040; }

    .btn-add {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: var(--green);
      color: #0a0c12;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-add:hover { background: #6ee7a0; }

    .player-list { display: flex; flex-direction: column; gap: 8px; }

    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg2);
    }

    .player-row-name { font-size: 14px; }

    .info-box {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg2);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 56px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 2;
    }

    .empty a { color: var(--green); cursor: pointer; text-decoration: none; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok { background: #14532d; border: 1px solid var(--green); color: var(--green); }
    #toast.err { background: #7f1d1d; border: 1px solid var(--red); color: var(--red); }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .loader-ball { font-size: 48px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }

    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* ── RESPONSIVE ── */
    @media(max-width:420px) {
      .logo-text h1 { font-size: 28px; }
      .nav-btn { padding: 12px 10px; font-size: 9px; }
      .winrate-num { font-size: 22px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-ball">⚽</div>
  <div>CARICAMENTO...</div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-ball">⚽</div>
      <div class="logo-text">
        <h1>CALCETTO BALILLA</h1>
        <p>classifiche ufficio</p>
      </div>
    </div>
    <div class="sync-badge">
      <div class="sync-dot-row">
        <div class="sync-dot" id="syncDot"></div>
        <span class="sync-label" id="syncLabel">LIVE</span>
      </div>
      <div class="sync-time" id="syncTime"></div>
    </div>
  </div>
</header>

<div class="month-strip" id="monthStrip"></div>

<nav class="nav-tabs">
  <button class="nav-btn active" onclick="switchTab('standings')">Classifica</button>
  <button class="nav-btn" onclick="switchTab('matches')">Partite</button>
  <button class="nav-btn" onclick="switchTab('add')">+ Registra</button>
  <button class="nav-btn" onclick="switchTab('manage')">Giocatori</button>
</nav>

<div class="wrap">

  <!-- STANDINGS -->
  <div class="panel active" id="panel-standings">
    <div class="section-label" id="standingsLabel"></div>
    <div class="standings-list" id="standingsList"></div>
  </div>

  <!-- MATCHES -->
  <div class="panel" id="panel-matches">
    <div class="section-label" id="matchesLabel"></div>
    <div class="match-list" id="matchList"></div>
  </div>

  <!-- ADD -->
  <div class="panel" id="panel-add">
    <div class="section-label">Registra nuova partita</div>

    <div class="form-group">
      <label class="form-label muted">Data</label>
      <input type="date" id="matchDate" />
    </div>

    <div class="form-group">
      <label class="form-label green">🏆 Vincitore</label>
      <div class="player-grid" id="winnerGrid"></div>
    </div>

    <div class="form-group">
      <label class="form-label red">💀 Perdente</label>
      <div class="player-grid" id="loserGrid"></div>
    </div>

    <div id="matchPreview" style="display:none" class="match-preview"></div>

    <button class="btn-submit" id="btnSubmit" disabled onclick="addMatch()">⚡ Registra Partita</button>
  </div>

  <!-- MANAGE -->
  <div class="panel" id="panel-manage">
    <div class="section-label">Gestisci giocatori</div>
    <div class="add-player-row">
      <input type="text" id="newPlayerName" placeholder="Nome giocatore..." onkeydown="if(event.key==='Enter')addPlayer()" />
      <button class="btn-add" onclick="addPlayer()">+ Aggiungi</button>
    </div>
    <div class="player-list" id="playerList"></div>
    <div class="info-box">
      🌐 I dati sono <span style="color:var(--green)">condivisi in tempo reale</span> con tutti i colleghi che aprono questo link.<br>
      🔄 Aggiornamento automatico ogni <span style="color:var(--green)">10 secondi</span>.
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const SUPABASE_URL = 'https://jevopxjmiiaawdhypqlk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impldm9weGptaWlhYXdkaHlwcWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDg2OTUsImV4cCI6MjA5MjQyNDY5NX0.ewfz1DQRM1YKE-Vl0864VkQ2rWfdzA13_mdW1gCsjQ0';
  const POLL_MS = 10000;

  // ── STATE ────────────────────────────────────────────────
  let players = [];
  let matches = [];
  let selectedMonth = monthKey(new Date());
  let selectedWinner = '';
  let selectedLoser = '';
  let currentTab = 'standings';
  let pollTimer = null;

  // ── UTILS ────────────────────────────────────────────────
  function monthKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function monthLabel(key) {
    const [y,m] = key.split('-');
    return new Date(Number(y), Number(m)-1, 1)
      .toLocaleDateString('it-IT', { month:'long', year:'numeric' });
  }

  function fmtDate(str) {
    return new Date(str + 'T12:00:00')
      .toLocaleDateString('it-IT', { day:'2-digit', month:'short' });
  }

  // ── SUPABASE API ─────────────────────────────────────────
  async function sb(path, opts={}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...opts.headers
      },
      ...opts
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function fetchAll() {
    const [m, p] = await Promise.all([
      sb('matches?select=*&order=created_at.desc'),
      sb('players?select=*&order=created_at.asc'),
    ]);
    matches = m || [];
    players = (p || []).map(r => r.name);
  }

  // ── SYNC STATUS ──────────────────────────────────────────
  function setSyncing(on) {
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    dot.className = 'sync-dot' + (on ? ' syncing' : '');
    lbl.textContent = on ? 'SYNC...' : 'LIVE';
  }

  function setError() {
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    dot.className = 'sync-dot error';
    lbl.textContent = 'ERRORE';
  }

  function updateSyncTime() {
    const el = document.getElementById('syncTime');
    el.textContent = new Date().toLocaleTimeString('it-IT');
  }

  // ── LOAD & POLL ──────────────────────────────────────────
  async function load(showLoading=false) {
    if (showLoading) setSyncing(true);
    try {
      await fetchAll();
      updateSyncTime();
      setSyncing(false);
      renderAll();
    } catch(e) {
      setError();
      console.error(e);
    }
  }

  function startPoll() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => load(), POLL_MS);
  }

  // ── RENDER ───────────────────────────────────────────────
  function renderAll() {
    renderMonths();
    renderStandings();
    renderMatches();
    renderPlayerGrids();
    renderPlayerList();
  }

  function renderMonths() {
    const allMonths = Array.from(
      new Set([monthKey(new Date()), ...matches.map(m => m.month)])
    ).sort((a,b) => b.localeCompare(a));

    const strip = document.getElementById('monthStrip');
    strip.innerHTML = allMonths.map(m => `
      <button class="month-btn ${m===selectedMonth?'active':''}"
        onclick="selectMonth('${m}')">
        ${monthLabel(m).toUpperCase()}
      </button>
    `).join('');
  }

  function renderStandings() {
    const monthMatches = matches.filter(m => m.month === selectedMonth);
    const stats = {};
    players.forEach(p => { stats[p] = {wins:0, losses:0}; });
    monthMatches.forEach(m => {
      if (!stats[m.winner]) stats[m.winner] = {wins:0,losses:0};
      if (!stats[m.loser])  stats[m.loser]  = {wins:0,losses:0};
      stats[m.winner].wins++;
      stats[m.loser].losses++;
    });

    const list = Object.entries(stats)
      .map(([name,s]) => { const t=s.wins+s.losses; return {name,wins:s.wins,losses:s.losses,total:t,avg:t>0?s.wins/t:0}; })
      .filter(p => p.total > 0)
      .sort((a,b) => b.wins-a.wins || b.avg-a.avg);

    document.getElementById('standingsLabel').textContent =
      `${monthLabel(selectedMonth)} — ${monthMatches.length} partite giocate`;

    const el = document.getElementById('standingsList');
    if (list.length === 0) {
      el.innerHTML = `<div class="empty">Nessuna partita registrata questo mese.<br><a onclick="switchTab('add')">Registra la prima! →</a></div>`;
      return;
    }

    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = list.map((p,i) => {
      const pct = (p.avg*100).toFixed(0);
      const cls = p.avg > 0.5 ? 'high' : p.avg === 0.5 ? 'mid' : 'low';
      return `
        <div class="standing-card ${i===0?'first':''}">
          <div class="rank">${medals[i] ?? `<span class="rank-num">${i+1}</span>`}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-stats">
              <span class="stat-w">✓ ${p.wins} vinte</span>
              <span class="stat-l">✗ ${p.losses} perse</span>
              <span class="stat-t">${p.total} tot</span>
            </div>
          </div>
          <div class="winrate">
            <div class="winrate-num ${cls}">${pct}%</div>
            <div class="winrate-label">WIN RATE</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderMatches() {
    const monthMatches = matches
      .filter(m => m.month === selectedMonth)
      .sort((a,b) => b.date.localeCompare(a.date));

    document.getElementById('matchesLabel').textContent =
      `${monthLabel(selectedMonth)} — storico partite`;

    const el = document.getElementById('matchList');
    if (monthMatches.length === 0) {
      el.innerHTML = `<div class="empty">Nessuna partita questo mese.</div>`;
      return;
    }

    el.innerHTML = monthMatches.map(m => `
      <div class="match-card">
        <div class="match-date">${fmtDate(m.date)}</div>
        <div class="match-players">
          <span class="match-winner">${m.winner}</span>
          <span class="match-vs">VS</span>
          <span class="match-loser">${m.loser}</span>
        </div>
        <button class="btn-delete" onclick="deleteMatch(${m.id})" title="Elimina">×</button>
      </div>`).join('');
  }

  function renderPlayerGrids() {
    ['winnerGrid','loserGrid'].forEach(gridId => {
      const isWinner = gridId === 'winnerGrid';
      document.getElementById(gridId).innerHTML = players.map(p => {
        let cls = 'player-chip';
        if (isWinner && p === selectedWinner) cls += ' sel-winner';
        if (!isWinner && p === selectedLoser) cls += ' sel-loser';
        return `<button class="${cls}" onclick="${isWinner?'pickWinner':'pickLoser'}('${p}')">${p}</button>`;
      }).join('');
    });
    updatePreview();
  }

  function renderPlayerList() {
    const el = document.getElementById('playerList');
    el.innerHTML = players.map(p => `
      <div class="player-row">
        <span class="player-row-name">⚽ ${p}</span>
        <button class="btn-delete" onclick="removePlayer('${p}')">×</button>
      </div>`).join('');
  }

  function updatePreview() {
    const preview = document.getElementById('matchPreview');
    const btn = document.getElementById('btnSubmit');
    if (selectedWinner && selectedLoser && selectedWinner !== selectedLoser) {
      preview.style.display = 'block';
      preview.innerHTML = `<span style="color:var(--green);font-weight:500">${selectedWinner}</span> <span style="color:#2a3040;font-size:11px">batte</span> <span style="color:var(--red);font-weight:500">${selectedLoser}</span>`;
      btn.disabled = false;
    } else {
      preview.style.display = 'none';
      btn.disabled = true;
    }
  }

  // ── ACTIONS ──────────────────────────────────────────────
  function selectMonth(m) {
    selectedMonth = m;
    renderAll();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
    document.querySelectorAll('.nav-btn')[['standings','matches','add','manage'].indexOf(tab)].classList.add('active');
  }

  function pickWinner(name) {
    selectedWinner = name;
    renderPlayerGrids();
  }

  function pickLoser(name) {
    selectedLoser = name;
    renderPlayerGrids();
  }

  async function addMatch() {
    if (!selectedWinner || !selectedLoser || selectedWinner === selectedLoser) return;
    const dateVal = document.getElementById('matchDate').value;
    if (!dateVal) return showToast('Seleziona una data', 'err');
    const month = monthKey(new Date(dateVal + 'T12:00:00'));
    setSyncing(true);
    try {
      await sb('matches', {
        method: 'POST',
        body: JSON.stringify({ winner: selectedWinner, loser: selectedLoser, date: dateVal, month })
      });
      selectedWinner = ''; selectedLoser = '';
      await load();
      selectedMonth = month;
      showToast('Partita registrata! ⚽');
      switchTab('standings');
    } catch(e) {
      setError();
      showToast('Errore nel salvataggio', 'err');
    }
  }

  async function deleteMatch(id) {
    setSyncing(true);
    try {
      await sb(`matches?id=eq.${id}`, { method: 'DELETE' });
      await load();
      showToast('Partita rimossa');
    } catch(e) {
      setError();
      showToast('Errore nella rimozione', 'err');
    }
  }

  async function addPlayer() {
    const name = document.getElementById('newPlayerName').value.trim();
    if (!name) return;
    if (players.includes(name)) return showToast('Giocatore già presente', 'err');
    setSyncing(true);
    try {
      await sb('players', { method: 'POST', body: JSON.stringify({ name }) });
      document.getElementById('newPlayerName').value = '';
      await load();
      showToast(`${name} aggiunto!`);
    } catch(e) {
      setError();
      showToast('Errore', 'err');
    }
  }

  async function removePlayer(name) {
    setSyncing(true);
    try {
      await sb(`players?name=eq.${encodeURIComponent(name)}`, { method: 'DELETE' });
      await load();
      showToast(`${name} rimosso`);
    } catch(e) {
      setError();
      showToast('Errore', 'err');
    }
  }

  // ── TOAST ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='ok') {
    clearTimeout(toastTimer);
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type;
    void el.offsetWidth;
    el.classList.add('show');
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── INIT ─────────────────────────────────────────────────
  document.getElementById('matchDate').value = new Date().toISOString().slice(0,10);

  load(true).then(() => {
    document.getElementById('loading').style.display = 'none';
    startPoll();
  });
</script>
</body>
</html>
